sonar.projectKey=jorgelopez04_BackendValidacion
sonar.organization=jorgelopez04
sonar.token=966a5b64d7641a61e3f43aa88a282e5b40e3e84e

# Definimos la raíz del código y las pruebas
sonar.sources=src
sonar.tests=src
sonar.sourceEncoding=UTF-8

# Definimos qué archivos son pruebas
sonar.test.inclusions=**/*.spec.ts
sonar.coverage.exclusions=**/*.spec.ts

# Ruta al reporte generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# EXCLUSIONES DE ANÁLISIS: No se suben a SonarQube
sonar.exclusions=**/*.js, **/*.css, **/*.html, **/*.scss, node_modules/**, dist/**, coverage/**

# EXCLUSIONES DE COBERTURA: Se analizan (calidad), pero no restan porcentaje de cobertura
# Esto ignora DTOs, Entidades puras y Boilerplate de NestJS (Líneas 30, 33, 36, etc.)
